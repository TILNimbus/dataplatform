# ================================================================
# dbt profiles.yml – Exchange Rate project
#
# POSIZIONE: mettere questo file nella root del progetto dbt
#            (accanto a dbt_project.yml) per il deploy Snowflake Native.
#
# Per sviluppo locale: copiare in ~/.dbt/profiles.yml
#
# Le variabili d'ambiente sono risolte da Snowflake durante
# EXECUTE DBT PROJECT quando DEFAULT_TARGET = 'prod'.
# Per sviluppo locale, esportarle nel terminale prima di `dbt run`.
# ================================================================

exchange_rate:
  target: prod

  outputs:

    # ── Produzione ────────────────────────────────────────────────
    prod:
      type:      snowflake
   #   account:   "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
   #   user:      "{{ env_var('SNOWFLAKE_USER') }}"
   #   password:  "{{ env_var('SNOWFLAKE_PASSWORD') }}"
      role:      N8N_ROLE
      database:  EXCHANGE_DB
      warehouse: DBT_WH
      schema:    ANALYTICS    # schema di output dei modelli marts
      threads:   4
  #    keepalive_idle_timeout: 240
      client_session_keep_alive: true

    # ── Sviluppo / CI su PR ───────────────────────────────────────
    dev:
      type:      snowflake
  #    account:   "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
  #    user:      "{{ env_var('SNOWFLAKE_USER') }}"
  #    password:  "{{ env_var('SNOWFLAKE_PASSWORD') }}"
      role:      N8N_ROLE
      database:  EXCHANGE_DB
      warehouse: DBT_WH
      schema:    ANALYTICS_DEV  # schema isolato per sviluppo, non tocca PROD
      threads:   4
